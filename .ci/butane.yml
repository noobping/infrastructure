name: butane
on: manual
execution:
  shell: bash
container:
  arch:
    - x64
    - arm64

steps:
  - name: Build installer ISOs
    use: podman
    container: false
    run: |
      set -euo pipefail

      namespace="${CI_IMAGE_NAMESPACE:-localhost:5000/noobping}"

      case "$CI_ARCH" in
        x64)
          coreos_arch="x86_64"
          ;;
        arm64)
          coreos_arch="aarch64"
          ;;
        *)
          echo "unsupported CI_ARCH: $CI_ARCH" >&2
          exit 1
          ;;
      esac

      run_yq() {
        if command -v yq >/dev/null 2>&1; then
          yq "$@"
        elif command -v flatpak-spawn >/dev/null 2>&1 \
          && flatpak-spawn --host sh -lc 'command -v yq >/dev/null 2>&1'; then
          flatpak-spawn --host yq "$@"
        else
          podman run --rm -v "$PWD:/work:Z" -w /work docker.io/mikefarah/yq:4.45.1 "$@"
        fi
      }

      render_butane() {
        local input="$1"
        local output="$2"
        local bootc_image="$3"

        sed \
          -e "s#__CI_IMAGE_NAMESPACE__#${namespace}#g" \
          -e "s#__CI_BOOTC_IMAGE__#${bootc_image}#g" \
          "$input" > "$output"
      }

      profiles=(
        "nas:nas"
        "workstation:workstation"
        "sway:workstation"
      )

      mkdir -p dist/ign dist/iso

      for profile_spec in "${profiles[@]}"; do
        IFS=: read -r profile butane_profile <<< "$profile_spec"

        run_yq ea '. as $item ireduce ({}; . *+ $item)' \
          butane/base.yml \
          "butane/${butane_profile}.yml" \
          > "butane/${profile}.bu"

        render_butane "butane/${profile}.bu" "butane/${profile}.rendered.bu" "$profile"

        podman run --rm \
          -v "$PWD:/work:Z" -w /work \
          quay.io/coreos/butane:release \
          --pretty --strict --files-dir . "butane/${profile}.rendered.bu" \
          > "dist/ign/${profile}.ign"
      done

      guest_profiles=(
        minecraft
        jellyfin
        k3s
      )

      for guest in "${guest_profiles[@]}"; do
        run_yq ea '. as $item ireduce ({}; . *+ $item)' \
          butane/base.yml \
          butane/vm.yml \
          "butane/${guest}.yml" \
          > "butane/${guest}.bu"

        render_butane "butane/${guest}.bu" "butane/${guest}.rendered.bu" "$guest"

        podman run --rm \
          -v "$PWD:/work:Z" -w /work \
          quay.io/coreos/butane:release \
          --pretty --strict --files-dir . "butane/${guest}.rendered.bu" \
          > "dist/ign/${guest}.ign"
      done

      if ! ls -1 fedora-coreos-*-live-iso."${coreos_arch}".iso >/dev/null 2>&1; then
        podman run --rm \
          --userns=keep-id \
          --user "$(id -u):$(id -g)" \
          -v "$PWD:/work:Z" -w /work \
          quay.io/coreos/coreos-installer:release \
          download -s stable -a "$coreos_arch" -p metal -f iso -C /work --decompress
      fi

      base_iso="$(ls -1 fedora-coreos-*-live-iso."${coreos_arch}".iso | tail -n1)"

      for profile_spec in "${profiles[@]}"; do
        profile=${profile_spec%%:*}

        out_iso="dist/iso/${profile}-${coreos_arch}.iso"
        tmp_iso="${out_iso}.tmp"
        rm -f "$tmp_iso"

        podman run --rm \
          --userns=keep-id \
          --user "$(id -u):$(id -g)" \
          -v "$PWD:/work:Z" -w /work \
          quay.io/coreos/coreos-installer:release \
          iso customize \
            --dest-ignition "dist/ign/${profile}.ign" \
            --pre-install butane/detect-device.sh \
            -o "$tmp_iso" \
            "$base_iso"

        mv -f "$tmp_iso" "$out_iso"
        sha256sum "$out_iso" | tee "${out_iso}.sha256"
      done
