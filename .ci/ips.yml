name: ips
on: manual
needs: ips-build
execution:
  shell: bash

steps:
  - name: Push IPS manifests
    use: podman
    if: arch(host)
    container: false
    run: |
      set -euo pipefail

      namespace="${CI_IMAGE_NAMESPACE:-localhost:5000/noobping}"
      tls_verify="${CI_REGISTRY_TLS_VERIFY:-false}"
      revision="$(git -C "$CI_REPO" rev-parse --short=12 HEAD)"
      base="${namespace}/ips"

      push_manifest() {
        local tag="$1"
        local suffix="$2"
        local candidate="${base}:candidate-${tag}-${revision}"
        local digest content immutable

        podman manifest rm "$candidate" >/dev/null 2>&1 || true
        podman manifest create "$candidate"
        podman manifest add --tls-verify="$tls_verify" "$candidate" "docker://${base}:amd64${suffix}"
        podman manifest add --tls-verify="$tls_verify" "$candidate" "docker://${base}:arm64${suffix}"
        podman manifest push --all --tls-verify="$tls_verify" "$candidate" "docker://$candidate"

        digest="$(skopeo inspect --tls-verify="$tls_verify" --format '{{.Digest}}' "docker://$candidate")"
        content="${digest#sha256:}"
        immutable="git-${revision}-img-${content:0:12}"
        skopeo copy --all --src-tls-verify="$tls_verify" --dest-tls-verify="$tls_verify" \
          "docker://$candidate" "docker://${base}:${immutable}"
        skopeo copy --all --src-tls-verify="$tls_verify" --dest-tls-verify="$tls_verify" \
          "docker://$candidate" "docker://${base}:${tag}"

        if [[ "${CI_SIGN_IMAGES:-}" == "1" ]]; then
          if command -v cosign >/dev/null 2>&1; then
            cosign sign --yes --allow-insecure-registry "${base}@${digest}"
          elif command -v flatpak-spawn >/dev/null 2>&1; then
            flatpak-spawn --host cosign sign --yes --allow-insecure-registry "${base}@${digest}"
          else
            echo "CI_SIGN_IMAGES=1 but cosign is not installed" >&2
            exit 1
          fi
        fi

        printf 'ips:%s -> %s (%s)\n' "$tag" "$immutable" "$digest"
        podman manifest rm "$candidate" >/dev/null 2>&1 || true
      }

      push_manifest latest ""
      push_manifest next "-next"
