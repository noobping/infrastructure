name: offline-opa
on: manual
execution:
  shell: bash
container:
  arch:
    - x64

steps:
  - name: Build offline OPA ISO
    use: podman
    container: false
    run: |
      set -euo pipefail

      repo="${CI_REPO:-$PWD}"
      namespace="${CI_IMAGE_NAMESPACE:-localhost:5000/noobping}"
      tls_verify="${CI_REGISTRY_TLS_VERIFY:-false}"
      uid="${CI_UID:-1000}"
      gid="${CI_GID:-1000}"
      isolation="${BUILDAH_ISOLATION:-chroot}"
      tmpdir="${TMPDIR:-/tmp}"
      source_url="$(git -C "$repo" config --get remote.origin.url || printf '%s' "$repo")"

      case "${CI_ARCH:-x64}" in
        x64)
          image_arch="amd64"
          coreos_arch="x86_64"
          ;;
        *)
          echo "offline-opa only supports x64 for now; got CI_ARCH=${CI_ARCH:-unset}" >&2
          exit 1
          ;;
      esac

      registry="${namespace%%/*}"
      case "$registry" in
        localhost:*|127.0.0.1:*)
          ;;
        *)
          echo "offline-opa requires a local CI_IMAGE_NAMESPACE; got $namespace" >&2
          exit 1
          ;;
      esac

      registry_host="${registry%:*}"
      registry_port="${registry##*:}"
      registry_container="${CI_LOCAL_REGISTRY_CONTAINER:-ci-registry}"
      registry_volume="${CI_LOCAL_REGISTRY_VOLUME:-ci-registry}"

      run_buildah() {
        if command -v buildah >/dev/null 2>&1; then
          TMPDIR="$tmpdir" buildah "$@"
        elif command -v flatpak-spawn >/dev/null 2>&1; then
          flatpak-spawn --host env TMPDIR="$tmpdir" buildah "$@"
        else
          echo "buildah is required to build and push images" >&2
          exit 1
        fi
      }

      run_yq() {
        if command -v yq >/dev/null 2>&1; then
          yq "$@"
        elif command -v flatpak-spawn >/dev/null 2>&1 \
          && flatpak-spawn --host sh -lc 'command -v yq >/dev/null 2>&1'; then
          flatpak-spawn --host yq "$@"
        else
          podman run --rm -v "$repo:/work:Z" -w /work docker.io/mikefarah/yq:4.45.1 "$@"
        fi
      }

      write_iso_with_archive() {
        local input_host="$1"
        local output_host="$2"
        local archive_host="$3"
        local input_container="$4"
        local output_container="$5"
        local archive_container="$6"

        if command -v xorriso >/dev/null 2>&1; then
          xorriso \
            -indev "$input_host" \
            -outdev "$output_host" \
            -boot_image any replay \
            -map "$archive_host" /bootc
        elif command -v flatpak-spawn >/dev/null 2>&1 \
          && flatpak-spawn --host sh -lc 'command -v xorriso >/dev/null 2>&1'; then
          flatpak-spawn --host xorriso \
            -indev "$input_host" \
            -outdev "$output_host" \
            -boot_image any replay \
            -map "$archive_host" /bootc
        else
          podman run --rm \
            -v "$repo:/work:Z" -w /work \
            -v "$work_dir:/work-tmp:Z" \
            registry.fedoraproject.org/fedora:latest \
            sh -lc 'dnf -y -q install xorriso >/dev/null; exec xorriso "$@"' \
            sh \
            -indev "$input_container" \
            -outdev "$output_container" \
            -boot_image any replay \
            -map "$archive_container" /bootc
        fi
      }

      registry_ready() {
        if command -v curl >/dev/null 2>&1; then
          curl -fsS "http://${registry}/v2/" >/dev/null 2>&1
          return $?
        fi

        if command -v wget >/dev/null 2>&1; then
          wget -q -O /dev/null "http://${registry}/v2/" >/dev/null 2>&1
          return $?
        fi

        (echo >/dev/tcp/"$registry_host"/"$registry_port") >/dev/null 2>&1
      }

      ensure_registry() {
        if registry_ready; then
          printf 'Local registry already running at %s\n' "$registry"
          return 0
        fi

        if podman container exists "$registry_container"; then
          podman start "$registry_container" >/dev/null
        else
          podman volume exists "$registry_volume" >/dev/null 2>&1 \
            || podman volume create "$registry_volume" >/dev/null
          podman run -d \
            --name "$registry_container" \
            -p "${registry_port}:5000" \
            -v "${registry_volume}:/var/lib/registry:Z" \
            docker.io/library/registry:2 >/dev/null
        fi

        for _ in {1..30}; do
          if registry_ready; then
            printf 'Local registry running at %s\n' "$registry"
            return 0
          fi
          sleep 1
        done

        echo "local registry did not become ready at $registry" >&2
        podman logs "$registry_container" >&2 || true
        exit 1
      }

      render_butane() {
        local input="$1"
        local output="$2"

        sed \
          -e "s#__CI_IMAGE_NAMESPACE__#${namespace}#g" \
          -e "s#ghcr.io/noobping#${namespace}#g" \
          "$input" > "$output"
      }

      build_image() {
        local context="$1"
        local containerfile="$2"
        local image="$3"
        shift 3

        run_buildah bud \
          --pull=always \
          --arch "$image_arch" \
          --isolation="$isolation" \
          --layers=false \
          --rm \
          -f "$containerfile" \
          -t "$image" \
          --label "org.opencontainers.image.source=${source_url}" \
          "$@" \
          "$context"

        run_buildah push --tls-verify="$tls_verify" "$image" "docker://$image"
        run_buildah rmi "$image" >/dev/null 2>&1 || true
        run_buildah prune -f >/dev/null 2>&1 || true
      }

      ensure_registry

      pushd "$repo" >/dev/null
      mkdir -p dist/ign dist/iso

      build_image ips ips/Containerfile "${namespace}/ips:${image_arch}" \
        --build-arg "FCOS_STREAM=stable" \
        --build-arg "UID=${uid}" \
        --build-arg "GID=${gid}"

      build_image opa opa/Containerfile "${namespace}/opa:${image_arch}" \
        --tls-verify="$tls_verify" \
        --build-arg "IMAGE_NAMESPACE=${namespace}" \
        --build-arg "TAG=${image_arch}" \
        --build-arg "UID=${uid}" \
        --build-arg "GID=${gid}"

      podman pull --tls-verify="$tls_verify" "${namespace}/opa:${image_arch}"
      podman tag "${namespace}/opa:${image_arch}" "${namespace}/opa:latest"
      podman push --tls-verify="$tls_verify" "${namespace}/opa:latest" "docker://${namespace}/opa:latest"

      work_dir="$(mktemp -d "${tmpdir%/}/offline-opa.XXXXXX")"
      trap 'rm -rf "$work_dir"' EXIT

      archive_dir="$work_dir/bootc"
      archive_dir_container="/work-tmp/bootc"
      mkdir -p "$archive_dir"
      archive="$archive_dir/opa.ociarchive"

      podman save --format oci-archive -o "$archive" "${namespace}/opa:latest"
      sha256sum "$archive" | tee "${archive}.sha256"

      run_yq ea '. as $item ireduce ({}; . *+ $item)' \
        butane/base.yml \
        butane/setup.yml \
        > butane/setup.bu

      render_butane butane/setup.bu butane/setup.rendered.bu

      podman run --rm \
        -v "$repo:/work:Z" -w /work \
        quay.io/coreos/butane:release \
        --pretty --strict --files-dir . butane/setup.rendered.bu \
        > dist/ign/setup.ign

      run_yq ea '. as $item ireduce ({}; . *+ $item)' \
        butane/base.yml \
        butane/updates.yml \
        butane/opa.yml \
        > butane/opa.bu

      render_butane butane/opa.bu butane/opa.rendered.bu

      podman run --rm \
        -v "$repo:/work:Z" -w /work \
        quay.io/coreos/butane:release \
        --pretty --strict --files-dir . butane/opa.rendered.bu \
        > dist/ign/opa.ign

      if ! ls -1 fedora-coreos-*-live-iso."${coreos_arch}".iso >/dev/null 2>&1; then
        podman run --rm \
          --userns=keep-id \
          --user "$(id -u):$(id -g)" \
          -v "$repo:/work:Z" -w /work \
          quay.io/coreos/coreos-installer:release \
          download -s stable -a "$coreos_arch" -p metal -f iso -C /work --decompress
      fi

      base_iso="$(ls -1 fedora-coreos-*-live-iso."${coreos_arch}".iso | tail -n1)"
      out_iso="dist/iso/opa-offline-${coreos_arch}.iso"
      out_iso_container="/work/${out_iso}"
      custom_iso="${work_dir}/opa-custom.iso"
      custom_iso_container="/work-tmp/opa-custom.iso"
      rm -f "$out_iso" "${out_iso}.sha256"

      podman run --rm \
        --userns=keep-id \
        --user "$(id -u):$(id -g)" \
        -v "$repo:/work:Z" -w /work \
        -v "$work_dir:/work-tmp:Z" \
        quay.io/coreos/coreos-installer:release \
        iso customize \
          --live-ignition dist/ign/setup.ign \
          --dest-ignition dist/ign/opa.ign \
          --pre-install butane/detect-device.sh \
          -o "$custom_iso_container" \
          "$base_iso"

      write_iso_with_archive \
        "$custom_iso" \
        "$out_iso" \
        "$archive_dir" \
        "$custom_iso_container" \
        "$out_iso_container" \
        "$archive_dir_container"

      sha256sum "$out_iso" | tee "${out_iso}.sha256"
      popd >/dev/null
