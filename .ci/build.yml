name: build
on: manual
needs: check
tech: rust
container:
  arch:
    - x64
    - arm64

steps:
  - name: build
    working-directory: tools/ci
    run: CARGO_TARGET_DIR="target/$CI_ARCH" cargo build --release --locked

  - name: package binary
    run: |
      set -eu
      source="tools/ci/target/$CI_ARCH/release/ci"
      install -Dm0755 "$source" "dist/ci-linux-$CI_ARCH"
      if [ "$CI_ARCH" = "$CI_HOST_ARCH" ]; then
        install -Dm0755 "$source" tools/ci/target/release/ci
      fi

  - name: checksum binary
    working-directory: dist
    run: sha256sum "ci-linux-$CI_ARCH" > "ci-linux-$CI_ARCH.sha256"
