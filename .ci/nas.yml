name: nas
on: manual
needs: nas-build
execution:
  shell: bash

steps:
  - name: Push NAS manifest
    use: podman
    if: arch(host)
    container: false
    run: |
      set -euo pipefail

      namespace="${CI_IMAGE_NAMESPACE:-localhost:5000/noobping}"
      tls_verify="${CI_REGISTRY_TLS_VERIFY:-false}"
      image="${namespace}/nas:latest"
      digest_file="$(mktemp)"

      run_cosign() {
        if command -v cosign >/dev/null 2>&1; then
          cosign "$@"
        elif command -v flatpak-spawn >/dev/null 2>&1; then
          flatpak-spawn --host cosign "$@"
        else
          echo "CI_SIGN_IMAGES=1 but cosign is not installed" >&2
          exit 1
        fi
      }

      podman manifest rm "$image" >/dev/null 2>&1 || true
      podman manifest create "$image"
      podman manifest add --tls-verify="$tls_verify" "$image" "docker://${namespace}/nas:amd64"
      podman manifest add --tls-verify="$tls_verify" "$image" "docker://${namespace}/nas:arm64"
      podman manifest push --all --tls-verify="$tls_verify" --digestfile "$digest_file" "$image" "docker://$image"
      if [[ "${CI_SIGN_IMAGES:-}" == "1" ]]; then
        run_cosign sign --yes --recursive --allow-insecure-registry "${image%:*}@$(cat "$digest_file")"
      fi
      rm -f "$digest_file"
      podman manifest rm "$image" >/dev/null 2>&1 || true
