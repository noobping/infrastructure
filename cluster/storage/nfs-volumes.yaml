apiVersion: v1
kind: PersistentVolume
metadata:
  name: nextcloud-shared
  labels:
    app.kubernetes.io/part-of: nextcloud
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 1Ti
  mountOptions:
    - nfsvers=4.2
    - fsc
    # These exports contain application data, never executable workloads.
    - nosuid
    - nodev
    - noexec
  nfs:
    path: /var/srv/docs/shared
    server: REPLACED_BY_KUSTOMIZE
  storageClassName: nfs-static
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-documents
  namespace: nextcloud
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: nfs-static
  volumeName: nextcloud-shared
---
