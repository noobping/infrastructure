apiVersion: v1
kind: PersistentVolume
metadata:
  name: nextcloud-shared
  labels:
    app.kubernetes.io/part-of: nextcloud
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 1Ti
  mountOptions:
    - nfsvers=4.2
    - hard
    - timeo=600
    - retrans=2
    # These exports contain application data, never executable workloads.
    - nosuid
    - nodev
    - noexec
  nfs:
    path: /var/srv/docs/shared
    server: REPLACED_BY_KUSTOMIZE
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-documents
  namespace: nextcloud
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: nfs-static
  volumeMode: Filesystem
  volumeName: nextcloud-shared
---
