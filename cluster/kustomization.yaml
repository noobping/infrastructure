apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - settings.yaml
  - namespaces.yaml
  - secrets
  - storage
  - apps/caddy
  - apps/nextcloud
  - apps/euro-office
  - apps/paperless
  - apps/uptime-kuma
  - apps/registry

replacements:
  - source:
      kind: ConfigMap
      name: cluster-settings
      namespace: kube-system
      fieldPath: data.nfsServer
    targets:
      - select:
          kind: PersistentVolume
        fieldPaths:
          - spec.nfs.server

