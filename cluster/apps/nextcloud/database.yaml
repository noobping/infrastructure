apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-postgresql
  labels:
    app.kubernetes.io/name: nextcloud-postgresql
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
  storageClassName: nfs-static
  volumeName: nextcloud-postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nextcloud-postgresql
  labels:
    app.kubernetes.io/name: nextcloud-postgresql
spec:
  serviceName: nextcloud-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nextcloud-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextcloud-postgresql
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgresql
          image: docker.io/library/postgres:18.3-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
          env:
            - {name: POSTGRES_DB, value: nextcloud}
            - {name: POSTGRES_USER, value: nextcloud}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: postgres-password
          ports:
            - {name: postgresql, containerPort: 5432, protocol: TCP}
          readinessProbe:
            exec:
              command: [pg_isready, -U, nextcloud, -d, nextcloud]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: [pg_isready, -U, nextcloud, -d, nextcloud]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: {cpu: 200m, memory: 512Mi}
            limits: {cpu: "2", memory: 2Gi}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql}
      terminationGracePeriodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-postgresql
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nextcloud-postgresql
  ports:
    - {name: postgresql, port: 5432, targetPort: postgresql}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-redis
  labels:
    app.kubernetes.io/name: nextcloud-redis
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
  storageClassName: nfs-static
  volumeName: nextcloud-redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nextcloud-redis
  labels:
    app.kubernetes.io/name: nextcloud-redis
spec:
  serviceName: nextcloud-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nextcloud-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextcloud-redis
    spec:
      automountServiceAccountToken: false
      containers:
        - name: redis
          image: docker.io/library/redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
          args: [redis-server, --appendonly, "yes", --save, "60", "1"]
          ports:
            - {name: redis, containerPort: 6379, protocol: TCP}
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-redis
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-redis
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nextcloud-redis
  ports:
    - {name: redis, port: 6379, targetPort: redis}
