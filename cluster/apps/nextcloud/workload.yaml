apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data
  labels:
    app.kubernetes.io/name: nextcloud
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 40Gi
  storageClassName: nfs-static
  volumeName: nextcloud-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  labels:
    app.kubernetes.io/name: nextcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nextcloud
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextcloud
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        # The root-squashed NAS export is group-writable by GID 1004.
        # Add the group without asking kubelet to chown NFS data.
        supplementalGroups: [1004]
      containers:
        - name: nextcloud
          image: docker.io/library/nextcloud:34.0.1-apache@sha256:6444fc5450302534e850b4d23c05b5f06c7b0d25bd5ece716452061454699c58
          imagePullPolicy: IfNotPresent
          env:
            - {name: POSTGRES_HOST, value: nextcloud-postgresql}
            - {name: POSTGRES_DB, value: nextcloud}
            - {name: POSTGRES_USER, value: nextcloud}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: postgres-password
            - {name: REDIS_HOST, value: nextcloud-redis}
            - {name: NEXTCLOUD_TRUSTED_DOMAINS, value: "nextcloud.vm nextcloud.nextcloud.svc.cluster.local"}
            - {name: TRUSTED_PROXIES, value: "10.42.0.0/16"}
            - {name: OVERWRITEPROTOCOL, value: https}
            - {name: OVERWRITEHOST, value: nextcloud.vm}
            - {name: OVERWRITECLIURL, value: "https://nextcloud.vm"}
            - {name: PHP_MEMORY_LIMIT, value: 1G}
            - {name: PHP_UPLOAD_LIMIT, value: 10G}
            - {name: APACHE_BODY_LIMIT, value: "0"}
            - {name: NEXTCLOUD_INIT_HTACCESS, value: "true"}
          ports:
            - {name: http, containerPort: 80, protocol: TCP}
          startupProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - {name: Host, value: nextcloud.vm}
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - {name: Host, value: nextcloud.vm}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - {name: Host, value: nextcloud.vm}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: 500m, memory: 1Gi}
            limits: {cpu: "4", memory: 4Gi}
          volumeMounts:
            - {name: nextcloud-data, mountPath: /var/www/html}
            - {name: shared-documents, mountPath: /var/srv/docs/shared}
      terminationGracePeriodSeconds: 120
      volumes:
        - name: nextcloud-data
          persistentVolumeClaim:
            claimName: nextcloud-data
        - name: shared-documents
          persistentVolumeClaim:
            claimName: shared-documents
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cron
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/component: cron
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: nextcloud
            app.kubernetes.io/component: cron
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 33
            runAsGroup: 33
            supplementalGroups: [1004]
          containers:
            - name: cron
              image: docker.io/library/nextcloud:34.0.1-apache@sha256:6444fc5450302534e850b4d23c05b5f06c7b0d25bd5ece716452061454699c58
              imagePullPolicy: IfNotPresent
              workingDir: /var/www/html
              command: [/bin/sh, -ec]
              args: [php -f /var/www/html/cron.php]
              env:
                - {name: POSTGRES_HOST, value: nextcloud-postgresql}
                - {name: POSTGRES_DB, value: nextcloud}
                - {name: POSTGRES_USER, value: nextcloud}
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nextcloud-secrets
                      key: postgres-password
                - {name: REDIS_HOST, value: nextcloud-redis}
              resources:
                requests: {cpu: 50m, memory: 256Mi}
                limits: {cpu: "1", memory: 1Gi}
              volumeMounts:
                - {name: nextcloud-data, mountPath: /var/www/html}
                - {name: shared-documents, mountPath: /var/srv/docs/shared}
          volumes:
            - name: nextcloud-data
              persistentVolumeClaim:
                claimName: nextcloud-data
            - name: shared-documents
              persistentVolumeClaim:
                claimName: shared-documents
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  labels:
    app.kubernetes.io/name: nextcloud
spec:
  selector:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/component: web
  ports:
    - {name: http, port: 80, targetPort: http}
