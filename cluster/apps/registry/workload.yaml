apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  labels:
    app.kubernetes.io/name: registry
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Gi
  storageClassName: nfs-static
  volumeName: registry-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  labels:
    app.kubernetes.io/name: registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      automountServiceAccountToken: false
      containers:
        - name: registry
          image: docker.io/library/registry:3.1.1@sha256:1be55279f18a2fe1a74edf2664cac61c1bea305b7b4642dab412e7affdcb3e33
          imagePullPolicy: IfNotPresent
          env:
            - {name: REGISTRY_STORAGE_DELETE_ENABLED, value: "true"}
            - {name: OTEL_TRACES_EXPORTER, value: none}
          ports:
            - {name: http, containerPort: 5000, protocol: TCP}
          readinessProbe:
            httpGet: {path: /v2/, port: http}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /v2/, port: http}
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "2", memory: 1Gi}
          volumeMounts:
            - {name: data, mountPath: /var/lib/registry}
      terminationGracePeriodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  labels:
    app.kubernetes.io/name: registry
spec:
  selector:
    app.kubernetes.io/name: registry
  ports:
    - {name: http, port: 5000, targetPort: http}
