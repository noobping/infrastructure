apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {port: 53, protocol: UDP}
        - {port: 53, protocol: TCP}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: paperless-web
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: paperless
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - {port: 8000, protocol: TCP}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless-postgresql
      ports:
        - {port: 5432, protocol: TCP}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless-redis
      ports:
        - {port: 6379, protocol: TCP}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless-tika
      ports:
        - {port: 9998, protocol: TCP}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless-gotenberg
      ports:
        - {port: 3000, protocol: TCP}
    # Mail delivery and integrations such as ASN/barcode lookups.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - {port: 80, protocol: TCP}
        - {port: 443, protocol: TCP}
        - {port: 465, protocol: TCP}
        - {port: 587, protocol: TCP}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: paperless-postgresql
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: paperless-postgresql
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless
      ports:
        - {port: 5432, protocol: TCP}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: paperless-redis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: paperless-redis
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless
      ports:
        - {port: 6379, protocol: TCP}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: paperless-converters
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [paperless-tika, paperless-gotenberg]
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless
      ports:
        - {port: 9998, protocol: TCP}
        - {port: 3000, protocol: TCP}
