apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data
  labels:
    app.kubernetes.io/name: paperless
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  labels:
    app.kubernetes.io/name: paperless
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1004
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
          imagePullPolicy: IfNotPresent
          env:
            - {name: PAPERLESS_REDIS, value: "redis://paperless-redis:6379"}
            - {name: PAPERLESS_DBENGINE, value: postgresql}
            - {name: PAPERLESS_DBHOST, value: paperless-postgresql}
            - {name: PAPERLESS_DBNAME, value: paperless}
            - {name: PAPERLESS_DBUSER, value: paperless}
            - {name: PAPERLESS_DBPASS_FILE, value: /run/secrets/paperless/db-password}
            - {name: PAPERLESS_SECRET_KEY_FILE, value: /run/secrets/paperless/secret-key}
            - {name: PAPERLESS_URL, value: "https://paperless.vm"}
            - {name: PAPERLESS_ALLOWED_HOSTS, value: paperless.vm}
            - {name: PAPERLESS_CSRF_TRUSTED_ORIGINS, value: "https://paperless.vm"}
            - {name: PAPERLESS_PROXY_SSL_HEADER, value: '["HTTP_X_FORWARDED_PROTO","https"]'}
            - {name: PAPERLESS_USE_X_FORWARD_HOST, value: "true"}
            - {name: PAPERLESS_USE_X_FORWARD_PORT, value: "true"}
            - {name: PAPERLESS_TIME_ZONE, value: Europe/Amsterdam}
            - {name: PAPERLESS_CONSUMER_POLLING, value: "10"}
            - {name: PAPERLESS_TIKA_ENABLED, value: "1"}
            - {name: PAPERLESS_TIKA_ENDPOINT, value: "http://paperless-tika:9998"}
            - {name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT, value: "http://paperless-gotenberg:3000"}
            - {name: PAPERLESS_OCR_LANGUAGES, value: nld}
            - {name: PAPERLESS_OCR_LANGUAGE, value: nld+eng}
            - {name: PAPERLESS_TASK_WORKERS, value: "1"}
            - {name: PAPERLESS_THREADS_PER_WORKER, value: "2"}
            - {name: PAPERLESS_WEBSERVER_WORKERS, value: "2"}
            - {name: USERMAP_UID, value: "1004"}
            - {name: USERMAP_GID, value: "1004"}
          ports:
            - {name: http, containerPort: 8000, protocol: TCP}
          startupProbe:
            tcpSocket: {port: http}
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket: {port: http}
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: 500m, memory: 1Gi}
            limits: {cpu: "4", memory: 4Gi}
          volumeMounts:
            - {name: data, mountPath: /usr/src/paperless/data}
            - {name: media, mountPath: /usr/src/paperless/media}
            - {name: export, mountPath: /usr/src/paperless/export}
            - {name: consume, mountPath: /usr/src/paperless/consume}
            - {name: secrets, mountPath: /run/secrets/paperless, readOnly: true}
      terminationGracePeriodSeconds: 120
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: export
          persistentVolumeClaim:
            claimName: paperless-export
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume
        - name: secrets
          secret:
            secretName: paperless-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: paperless
  labels:
    app.kubernetes.io/name: paperless
spec:
  selector:
    app.kubernetes.io/name: paperless
  ports:
    - {name: http, port: 8000, targetPort: http}

