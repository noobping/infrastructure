apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {port: 53, protocol: UDP}
        - {port: 53, protocol: TCP}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: caddy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: caddy
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - {port: 80, protocol: TCP}
        - {port: 443, protocol: TCP}
        - {port: 443, protocol: UDP}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nextcloud
          podSelector:
            matchLabels:
              app.kubernetes.io/name: nextcloud
      ports:
        - {port: 80, protocol: TCP}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: office
          podSelector:
            matchLabels:
              app.kubernetes.io/name: euro-office
      ports:
        - {port: 80, protocol: TCP}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: paperless
          podSelector:
            matchLabels:
              app.kubernetes.io/name: paperless
      ports:
        - {port: 8000, protocol: TCP}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: uptime-kuma
      ports:
        - {port: 3001, protocol: TCP}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
          podSelector:
            matchLabels:
              app.kubernetes.io/name: registry
      ports:
        - {port: 5000, protocol: TCP}
    # music.vm proxies to the retained NAS Jellyfin service on the UniFi LAN.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - {port: 8096, protocol: TCP}
