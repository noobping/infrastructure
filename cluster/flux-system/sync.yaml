apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 5m
  ref:
    branch: main
  timeout: 60s
  url: https://github.com/noobping/infrastructure.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cluster
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  force: false
  interval: 10m
  path: ./cluster
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: infrastructure
  timeout: 15m
  wait: true

