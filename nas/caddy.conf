(web_root) {
    handle {
        root * /srv/web
        file_server browse
    }
}

(common_routes) {
    @nextcloud path /nextcloud /nextcloud/* /cloud /cloud/*
    handle @nextcloud {
        redir * http://{host}:8081/ 302
    }

    @paperless path /paperless /paperless/*
    handle @paperless {
        redir * http://{host}:8000/ 302
    }

    @gogs path /git /git/*
    handle @gogs {
        redir * http://{host}:8929/ 302
    }

    @registry path /v2 /v2/*
    handle @registry {
        redir * http://{host}:5000{uri} 302
    }

    @jellyfin path /jellyfin /jellyfin/* /music /music/*
    handle @jellyfin {
        redir * http://{host}:8096/ 302
    }

    @uptime path /uptime /uptime/*
    handle @uptime {
        redir * http://{host}:3001/ 302
    }

    @status_root path /status /status/
    handle @status_root {
        redir * http://{host}:3001/status/default 302
    }

    @status path /status/*
    handle @status {
        redir * http://{host}:3001{uri} 302
    }

    @cockpit path /cockpit /cockpit/* /server /server/* /admin /admin/* /dash /dash/* /dashboard /dashboard/* /manage /manage/*
    handle @cockpit {
        redir * https://{host}:9090/ 302
    }

    import web_root
}

:443 {
    import common_routes
}

:80 {
    import common_routes
}
