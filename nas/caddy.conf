(web_root) {
    handle {
        root * /srv/web
        file_server browse
    }
}

(common_routes) {
    @registry path /v2 /v2/*
    handle @registry {
        redir * http://{host}:5000{uri} 302
    }

    @jellyfin path /jellyfin /jellyfin/* /music /music/*
    handle @jellyfin {
        redir * http://{host}:8096/ 302
    }

    @cockpit path /cockpit /cockpit/* /server /server/* /admin /admin/* /dash /dash/* /dashboard /dashboard/* /manage /manage/*
    handle @cockpit {
        redir * https://{host}:9090/ 302
    }

    import web_root
}

:443 {
    import common_routes
}

:80 {
    import common_routes
}
