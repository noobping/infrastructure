(web_root) {
	handle {
		root * /srv/web
		file_server browse
	}
}

(common_routes) {
	@nextcloud_root path /nextcloud
	redir @nextcloud_root /nextcloud/ 308

	@nextcloud_alias path /cloud /cloud/*
	redir @nextcloud_alias /nextcloud/ 308

	@carddav path /.well-known/carddav
	redir @carddav /nextcloud/remote.php/dav/ 301

	@caldav path /.well-known/caldav
	redir @caldav /nextcloud/remote.php/dav/ 301

	handle_path /nextcloud/* {
		reverse_proxy 127.0.0.1:8081 {
			header_up X-Real-IP {remote_host}
		}
	}

	@registry path /v2 /v2/*
	handle @registry {
		header Docker-Distribution-Api-Version "registry/2.0"
		reverse_proxy 127.0.0.1:5000
	}

	@jellyfin path /jellyfin /jellyfin/* /music /music/*
	handle @jellyfin {
		redir * http://{host}:8096/ 302
	}

	@uptime path /uptime /uptime/*
	handle @uptime {
		redir * http://{host}:3001/ 302
	}

	@status path /status /status/* /api/status-page/* /assets/* /icon.svg /apple-touch-icon.png
	handle @status {
		reverse_proxy 127.0.0.1:3001
	}

	@cockpit path /cockpit /cockpit/* /server /server/* /admin /admin/* /dash /dash/* /dashboard /dashboard/* /manage /manage/*
	handle @cockpit {
		redir * https://{host}:9090/ 302
	}

	import web_root
}

http:// {
	redir https://{host}{uri} 308
}

https:// {
	tls internal {
		on_demand
	}
	import common_routes
}
