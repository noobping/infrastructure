http://ipa.nick.nas {
    redir https://ipa.nick.nas{uri} permanent
}

https://ipa.nick.nas {
    tls internal

    reverse_proxy https://127.0.0.1:8443 {
        transport http {
            tls_insecure_skip_verify
            tls_server_name ipa.nick.nas
        }
    }
}

(common_routes) {
    @ipa path /ipa /ipa/* /domain /domain/*
    handle @ipa {
        uri strip_prefix /ipa
        uri strip_prefix /domain
        redir https://ipa.nick.nas{uri} permanent
    }

    @nextcloud path /nextcloud /nextcloud/* /cloud /cloud/*
    handle @nextcloud {
        uri strip_prefix /nextcloud
        uri strip_prefix /cloud
        reverse_proxy 127.0.0.1:8081
    }

    @gogs path /git /git/*
    handle @gogs {
        uri strip_prefix /git
        reverse_proxy 127.0.0.1:8929
    }

    @registry path /v2 /v2/*
    handle @registry {
        reverse_proxy 127.0.0.1:5000
    }

    @jellyfin path /jellyfin /jellyfin/* /music /music/*
    handle @jellyfin {
        uri strip_prefix /jellyfin
        uri strip_prefix /music
        reverse_proxy 127.0.0.1:8096
    }

    @uptime_root path /uptime /uptime/
    handle @uptime_root {
        rewrite * /dashboard
        reverse_proxy 127.0.0.1:3001
    }

    @uptime path /uptime/*
    handle @uptime {
        uri strip_prefix /uptime
        reverse_proxy 127.0.0.1:3001
    }

    @status_root path /status /status/
    handle @status_root {
        rewrite * /status/default
        reverse_proxy 127.0.0.1:3001
    }

    @status path /status/*
    handle @status {
        reverse_proxy 127.0.0.1:3001
    }

    @cockpit path /cockpit /cockpit/* /server /server/* /admin /admin/*
    handle @cockpit {
        uri strip_prefix /cockpit
        uri strip_prefix /server
        uri strip_prefix /admin
        reverse_proxy https://127.0.0.1:9090 {
            transport http {
                tls_insecure_skip_verify
            }
        }
    }

    handle {
        root * /srv/web
        file_server browse
    }
}

:443 {
    import common_routes
}

:80 {
    redir https://{host}{uri} permanent
}
