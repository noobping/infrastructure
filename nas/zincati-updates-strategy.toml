[updates]
strategy = "periodic"

# Zincati maintenance windows are specified in UTC.
# 19:00-22:00 UTC covers the existing evening shutdown window
# in Europe/Amsterdam across summer/winter time changes.
[[updates.periodic.window]]
days = [ "Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun" ]
start_time = "19:00"
length_minutes = 180
