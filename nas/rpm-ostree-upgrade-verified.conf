[Unit]
# Existing Ignition-created units survive an OSTree image update. This vendor
# drop-in makes their updater verified without requiring another provision.
ConditionPathExists=/var/rebase.done
ConditionPathExists=/etc/bootc-image-ref

[Service]
TimeoutStartSec=0
ExecStart=
ExecStart=/usr/libexec/infrastructure/bootc-verified-update
