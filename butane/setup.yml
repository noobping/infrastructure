variant: fcos
version: 1.6.0

storage:
  files:
    - path: /usr/local/sbin/detect-device.sh
      mode: 0755
      contents:
        local: ./butane/detect-device.sh

    - path: /etc/hostname
      mode: 0440
      contents:
        inline: |
          setup

systemd:
  units:
    - name: sshd.service
      mask: true
    - name: getty@.service
      mask: true
    - name: serial-getty@.service
      mask: true
    - name: emergency.service
      mask: true
    - name: rescue.service
      mask: true