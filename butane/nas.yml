boot_device:
  luks:
    tpm2: true

kernel_arguments:
  should_exist:
    - crashkernel=512M
    - libata.eh_timeout=240
    - loglevel=3
    # - libata.force=noncq
    # - libata.noacpi=1
    # - ahci.mobile_lpm_policy=1

passwd:
  groups:
    - name: libvirt
      system: true
  users:
    - name: data
      uid: 1008
      home_dir: /var/srv/data
      shell: /usr/bin/nologin
    - name: git
      uid: 1007
      home_dir: /var/srv/git
      shell: /usr/bin/nologin
    - name: videos
      uid: 1006
      home_dir: /var/srv/videos
      shell: /usr/bin/nologin
    - name: photos
      uid: 1005
      home_dir: /var/srv/photos
      shell: /usr/bin/nologin
    - name: docs
      uid: 1004
      home_dir: /var/srv/docs
      shell: /usr/bin/nologin
    - name: music
      uid: 1001
      home_dir: /var/srv/music
      shell: /usr/bin/nologin
    - name: nick
      password_hash: "!"
      uid: 1000
      groups:
        - wheel
        - libvirt
        - music
        - docs
        - photos
        - videos
        - git
        - data
      ssh_authorized_keys:
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEjRfPMkXzhO4unF0mEOHge+wGAE9VarXYo7RRXX2L3j
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBgtZmKuTJY2z88tCrtexFTPmXGA6oR1m4XQVn8ZLzmj

storage:
  directories:
    - path: /var/srv/git
      mode: 0750
      user:
        name: git
      group:
        name: git
    - path: /var/srv/music/touhou
      user:
        name: music
      group:
        name: music
    - path: /var/srv/books
      user:
        name: music
      group:
        name: music
    - path: /var/srv/ssd
    - path: /var/srv/hdd
  files:
    - path: /etc/hostname
      mode: 0440
      overwrite: true
      contents:
        inline: |
          nas

systemd:
  units:
    - name: nightly-shutdown.service
      enabled: true
      contents: |
        [Unit]
        Description=Power off the system at 21:30
        After=network.target

        [Service]
        Type=oneshot
        ExecStart=/usr/sbin/shutdown -h 21:30

        [Install]
        WantedBy=multi-user.target

    - name: wake-on-lan.service
      enabled: true
      contents: |
        [Unit]
        Description=Power on the system (just once after shutdown)
        Wants=network-online.target
        After=network-online.target

        [Service]
        Type=oneshot
        ExecStart=/usr/sbin/sh -c 'dev=$(ip -br link | awk '\''$2=="UP" && $1!="lo" {print $1; exit}'\''); if [ -n "$dev" ]; then ethtool -s "$dev" wol g && echo "WOL enabled on $dev"; fi'

        [Install]
        WantedBy=multi-user.target
