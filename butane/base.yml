variant: fcos
version: 1.6.0

passwd:
  users:
    - name: core
      should_exist: false

storage:
  links:
    - path: /etc/localtime
      target: /usr/share/zoneinfo/Europe/Amsterdam
      overwrite: true

  files:    
    - path: /etc/nftables.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          #!/usr/sbin/nft -f
          table inet filter {
            chain input {
              type filter hook input priority 0;
              iif lo accept
              ct state established,related accept
              include "/etc/nftables.d/*.nft"
              reject with icmpx type admin-prohibited
            }
          }

  directories:
    - path: /etc/nftables.d

systemd:
  units:
    - name: nftables.service
      enabled: true

    - name: rpm-ostreed.service
      enabled: true

    - name: podman.socket
      enabled: true

    - name: podman-auto-update.timer
      enabled: true

    - name: systemd-timesyncd.service
      enabled: true
