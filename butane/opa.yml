variant: fcos
version: 1.6.0

boot_device:
  luks:
    tpm2: true

kernel_arguments:
  should_exist:
    - quiet
    - splash
    - loglevel=3
    - systemd.show_status=false
    - rd.systemd.show_status=false

passwd:
  users:
    - name: nick
      password_hash: $6$7fNbJeEeffQ7h36Y$u2tMk5CyjP/Q3pq.XFjFvDty0aKOUAhf4jsobML8rjlD2uBsGw44RTyG7qNcJhMr1GSXEdJ7ZHJGsZj2/Uyua1
      uid: 1000
      groups:
        - wheel
    - name: herman
      password_hash: $6$.I7Yu7EaYwOsk8Av$u5P5l8UMs4nvENw9J4R8IJUj7FHTrld2FlgU.0h/FNgQQSCuwxqVlvKIIPGOw2/eV2GGlnjkPvbAOT/vcjyWp0
      uid: 1001

storage:
  directories:
    - path: /etc/rclone
      mode: 0700
  files:
    - path: /etc/locale.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          LANG=nl_NL.UTF-8
    - path: /etc/vconsole.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          KEYMAP=us
          XKBLAYOUT=us
          XKBVARIANT=intl
    - path: /etc/X11/xorg.conf.d/00-keyboard.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          Section "InputClass"
            Identifier "keyboard-all"
            MatchIsKeyboard "on"
            Option "XkbLayout" "us"
            Option "XkbVariant" "intl"
          EndSection
    - path: /etc/hostname
      mode: 0440
      overwrite: true
      contents:
        inline: |
          opa

systemd:
  units:
    - name: getty@tty1.service
      mask: true
    - name: expire-herman-password.service
      enabled: true
      contents: |
        [Unit]
        Description=Expire Herman initial password
        Before=display-manager.service graphical.target
        ConditionPathExists=!/var/lib/herman-password-expired

        [Service]
        Type=oneshot
        ExecStart=/usr/bin/chage -d 0 herman
        ExecStart=/usr/bin/touch /var/lib/herman-password-expired

        [Install]
        WantedBy=multi-user.target
    - name: rebase-to-opa.service
      enabled: true
      contents: |
        [Unit]
        Description=Rebase FCOS to boot container image
        Wants=network-online.target NetworkManager-wait-online.service
        After=network-online.target NetworkManager-wait-online.service
        Before=rpm-ostree-upgrade.service
        ConditionPathExists=!/var/lib/rebase.done

        [Service]
        Type=oneshot
        Restart=on-failure
        RestartSec=30s
        StartLimitIntervalSec=0
        StandardOutput=tty
        StandardError=tty
        TTYPath=/dev/tty1
        Environment=LANG=C.UTF-8
        Environment=LC_ALL=C.UTF-8
        ExecStart=/usr/local/sbin/rebase-to-image opa:latest
        ExecStart=/usr/bin/touch /var/lib/rebase.done
        ExecStart=/usr/bin/systemctl --no-block reboot

        [Install]
        WantedBy=multi-user.target
    - name: profile-sync.service
      enabled: true
      contents: |
        [Unit]
        Description=Sync local profile to STACK
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=/usr/bin/rclone

        [Service]
        Type=oneshot
        ExecStart=/usr/bin/rclone sync /var/home/herman stack:profiles/%H/
        Nice=10

        [Install]
        WantedBy=multi-user.target
    - name: profile-sync.timer
      enabled: true
      contents: |
        [Unit]
        Description=Periodic profile sync to STACK

        [Timer]
        OnBootSec=5min
        OnUnitActiveSec=15min
        Persistent=true

        [Install]
        WantedBy=timers.target
