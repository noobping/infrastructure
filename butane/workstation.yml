variant: fcos
version: 1.6.0

boot_device:
  luks:
    tpm2: true

kernel_arguments:
  should_exist:
    - quiet
    - splash
    - loglevel=3
    - systemd.show_status=false
    - rd.systemd.show_status=false

passwd:
  groups:
    - name: qemu
      system: true
  users:
    - name: nick
      password_hash: $6$7fNbJeEeffQ7h36Y$u2tMk5CyjP/Q3pq.XFjFvDty0aKOUAhf4jsobML8rjlD2uBsGw44RTyG7qNcJhMr1GSXEdJ7ZHJGsZj2/Uyua1
      uid: 1000
      groups:
        - wheel
        - qemu

storage:
  directories:
    - path: /var/cache/fscache
      mode: 0700
  files:
    - path: /etc/locale.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          LANG=nl_NL.UTF-8
    - path: /etc/vconsole.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          KEYMAP=us
          XKBLAYOUT=us
          XKBVARIANT=intl
    - path: /etc/X11/xorg.conf.d/00-keyboard.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          Section "InputClass"
            Identifier "keyboard-all"
            MatchIsKeyboard "on"
            Option "XkbLayout" "us"
            Option "XkbVariant" "intl"
          EndSection
    - path: /etc/hostname
      mode: 0440
      overwrite: true
      contents:
        inline: |
          workstation

systemd:
  units:
    - name: getty@tty1.service
      mask: true
    - name: rebase-to-workstation.service
      enabled: true
      contents: |
        [Unit]
        Description=Rebase FCOS to boot container image
        Wants=network-online.target NetworkManager-wait-online.service
        After=network-online.target NetworkManager-wait-online.service
        ConditionPathExists=!/var/lib/rebase.done

        [Service]
        Type=oneshot
        Restart=on-failure
        RestartSec=30s
        StartLimitIntervalSec=0
        StandardOutput=tty
        StandardError=tty
        TTYPath=/dev/tty1
        Environment=LANG=C.UTF-8
        Environment=LC_ALL=C.UTF-8
        ExecStart=/usr/bin/sh -euxc ' \
          image="ostree-image-signed:docker://ghcr.io/noobping/workstation:latest"; \
          if /usr/bin/rpm-ostree status | /usr/bin/grep -Fq "● $image"; then \
            /usr/bin/touch /var/lib/rebase.done; \
            exit 0; \
          fi; \
          /usr/bin/rpm-ostree rebase "$image"; \
          /usr/bin/touch /var/lib/rebase.done; \
          /usr/bin/systemctl --no-block reboot \
        '

        [Install]
        WantedBy=multi-user.target

    - name: system-flatpaks.service
      enabled: true
      contents: |
        [Unit]
        Description=Install system Flatpaks
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=/var/lib/rebase.done
        ConditionPathExists=!/var/lib/system-flatpaks.done

        [Service]
        Type=oneshot
        Restart=on-failure
        RestartSec=30s
        StartLimitIntervalSec=0
        ExecStart=/usr/bin/flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        ExecStart=/usr/bin/flatpak remote-add --system --if-not-exists fedora oci+https://registry.fedoraproject.org
        ExecStart=/usr/bin/flatpak install --system --noninteractive flathub \
          com.belmoussaoui.Decoder \
          com.mattjakeman.ExtensionManager \
          io.github.kolunmi.Bazaar \
          org.gnome.Calendar \
          org.gnome.Epiphany \
          org.gnome.Loupe \
          org.gnome.Papers \
          io.github.noobping.keycord \
          org.gnome.TextEditor \
          org.getzola.zola \
          org.flatpak.Builder
        ExecStart=/usr/bin/touch /var/lib/system-flatpaks.done

        [Install]
        WantedBy=multi-user.target
    - name: update-system-flatpaks.service
      enabled: true
      contents: |
        [Unit]
        Description=Update system flatpaks
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=/var/lib/system-flatpaks.done

        [Service]
        Type=oneshot
        Restart=on-failure
        RestartSec=30s
        StartLimitIntervalSec=0
        ExecStart=/usr/bin/flatpak update --system --noninteractive

        [Install]
        WantedBy=multi-user.target
    - name: update-system-flatpaks.timer
      enabled: true
      contents: |
        [Unit]
        Description=Daily system Flatpak update timer

        [Timer]
        OnCalendar=daily
        Persistent=true
        RandomizedDelaySec=1h

        [Install]
        WantedBy=timers.target
