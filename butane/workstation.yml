variant: fcos
version: 1.6.0

boot_device:
  luks:
    tpm2: true

kernel_arguments:
  should_exist:
    - quiet
    - splash
    - loglevel=3
    - systemd.show_status=false
    - rd.systemd.show_status=false

passwd:
  groups:
    - name: qemu
      system: true

storage:
  directories:
    - path: /var/cache/fscache
      mode: 0700
  files:
    - path: /etc/locale.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          LANG=nl_NL.UTF-8
    - path: /etc/vconsole.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          KEYMAP=us
          XKBLAYOUT=us
          XKBVARIANT=intl
    - path: /etc/X11/xorg.conf.d/00-keyboard.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          Section "InputClass"
            Identifier "keyboard-all"
            MatchIsKeyboard "on"
            Option "XkbLayout" "us"
            Option "XkbVariant" "intl"
          EndSection
    - path: /etc/hostname
      mode: 0440
      overwrite: true
      contents:
        inline: |
          workstation

systemd:
  units:
    - name: getty@tty1.service
      mask: true
    - name: rebase-to-workstation.service
      enabled: true
      contents: |
        [Unit]
        Description=Rebase FCOS to boot container image
        Wants=network-online.target NetworkManager-wait-online.service
        After=network-online.target NetworkManager-wait-online.service
        ConditionPathExists=!/var/lib/rebase.done

        [Service]
        Type=oneshot
        Restart=on-failure
        RestartSec=30s
        StartLimitIntervalSec=0
        StandardOutput=tty
        StandardError=tty
        TTYPath=/dev/tty1
        Environment=LANG=C.UTF-8
        Environment=LC_ALL=C.UTF-8
        ExecStart=/usr/local/sbin/rebase-to-bootc ghcr.io/noobping/workstation:latest /var/lib/bootc-images/workstation.ociarchive
        ExecStart=/usr/bin/touch /var/lib/rebase.done
        ExecStart=/usr/bin/systemctl --no-block reboot

        [Install]
        WantedBy=multi-user.target
