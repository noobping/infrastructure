boot_device:
  luks:
    tpm2: true

kernel_arguments:
  should_exist:
    - quiet
    - splash
    - loglevel=3
    - systemd.show_status=false
    - rd.systemd.show_status=false

passwd:
  groups:
    - name: qemu
      system: true
  users:
    - name: nick
      password_hash: $6$7fNbJeEeffQ7h36Y$u2tMk5CyjP/Q3pq.XFjFvDty0aKOUAhf4jsobML8rjlD2uBsGw44RTyG7qNcJhMr1GSXEdJ7ZHJGsZj2/Uyua1
      uid: 1000
      groups:
        - wheel
        - qemu

storage:
  directories:
    - path: /var/cache/fscache
      mode: 0700
  files:
    - path: /etc/locale.conf
      overwrite: true
      contents:
        inline: |
          LANG=nl_NL.UTF-8
    - path: /etc/vconsole.conf
      overwrite: true
      contents:
        inline: |
          KEYMAP=us
          XKBLAYOUT=us
          XKBVARIANT=intl
    - path: /etc/X11/xorg.conf.d/00-keyboard.conf
      overwrite: true
      contents:
        inline: |
          Section "InputClass"
            Identifier "keyboard-all"
            MatchIsKeyboard "on"
            Option "XkbLayout" "us"
            Option "XkbVariant" "intl"
          EndSection
    - path: /etc/hostname
      mode: 0440
      overwrite: true
      contents:
        inline: |
          workstation

systemd:
  units:
    - name: getty@tty1.service
      mask: true
