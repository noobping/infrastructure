name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "tools/ci/**"
      - ".ci/**"
      - ".github/workflows/ci.yml"
      - "!**/*.md"

  pull_request:
    paths:
      - "tools/ci/**"
      - ".ci/**"
      - ".github/workflows/ci.yml"
      - "!**/*.md"

  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ci
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap CI
        run: cargo build --release --locked --manifest-path tools/ci/Cargo.toml

      - name: Build with CI
        run: >-
          tools/ci/target/release/ci
          --repo "$GITHUB_WORKSPACE"
          --no-container
          --arch "${{ matrix.arch }}"
          build
          --no-recursive-checkout

      - name: Validate infrastructure workflows
        run: >-
          tools/ci/target/release/ci
          --repo "$GITHUB_WORKSPACE"
          run
          --all
          --dry-run
          --no-recursive-checkout

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ci-linux-${{ matrix.arch }}
          path: |
            dist/ci-linux-${{ matrix.arch }}
            dist/ci-linux-${{ matrix.arch }}.sha256

  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: continuous-release

    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Release binaries
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifacts: "dist/ci-linux-x64,dist/ci-linux-x64.sha256,dist/ci-linux-arm64,dist/ci-linux-arm64.sha256"
          generateReleaseNotes: false
          body: |
            This release is automatically updated.
