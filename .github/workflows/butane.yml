name: Butane

on:
  push:
    branches:
      - main
      - master
    paths:
      - "butane/**"
      - ".github/workflows/butane.yml"

  workflow_dispatch: {}

concurrency:
  group: butane
  cancel-in-progress: true

env:
  CI_IMAGE_NAMESPACE: ghcr.io/noobping

jobs:
  build:
    name: Build ${{ matrix.arch.name }} ${{ matrix.profile }}
    strategy:
      matrix:
        arch:
          - name: amd64
            runs_on: ubuntu-latest
          - name: arm64
            runs_on: ubuntu-24.04-arm
        profile: [workstation]

    runs-on: ${{ matrix.arch.runs_on }}

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4.45.1

      - name: Install Podman
        run: |
          set -euxo pipefail
          if ! command -v podman >/dev/null 2>&1 || ! command -v xorriso >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman xorriso
          fi
          podman --version
          xorriso -version

      - name: Merge butane files
        run: |
          set -euxo pipefail
          yq ea '. as $item ireduce ({}; . *+ $item)' butane/base.yml butane/setup.yml > butane/setup.bu
          yq ea '. as $item ireduce ({}; . *+ $item)' butane/base.yml butane/updates.yml butane/${{ matrix.profile }}.yml > butane/${{ matrix.profile }}.bu
          sed "s#__CI_IMAGE_NAMESPACE__#${CI_IMAGE_NAMESPACE}#g" butane/setup.bu > butane/setup.rendered.bu
          sed "s#__CI_IMAGE_NAMESPACE__#${CI_IMAGE_NAMESPACE}#g" butane/${{ matrix.profile }}.bu > butane/${{ matrix.profile }}.rendered.bu

      - name: Build ignition files
        run: |
          set -euxo pipefail

          podman run --rm \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/butane:release \
            --pretty --strict --files-dir . butane/setup.rendered.bu > setup.ign

          podman run --rm \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/butane:release \
            --pretty --strict --files-dir . butane/${{ matrix.profile }}.rendered.bu > ${{ matrix.profile }}.ign

      - name: Download stable release
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          podman run --rm \
            --userns=keep-id \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/coreos-installer:release \
            download -s stable -a "$arch" -p metal -f iso -C /work --decompress

      - name: Export bootc image
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          image_ref="${CI_IMAGE_NAMESPACE}/${{ matrix.profile }}:latest"

          mkdir -p bootc
          echo "$GITHUB_TOKEN" | podman login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          podman pull "$image_ref"
          podman save --format oci-archive -o "bootc/${{ matrix.profile }}.ociarchive" "$image_ref"
          sha256sum "bootc/${{ matrix.profile }}.ociarchive" | awk '{ print $1 }' > "bootc/${{ matrix.profile }}.ociarchive.sha256"

      - name: Build artifacts
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          base_iso="$(ls -1 fedora-coreos-*-live-iso."$arch".iso | tail -n1)"
          out_iso="${{ matrix.profile }}-${arch}.iso"

          podman run --rm \
            --userns=keep-id \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/coreos-installer:release \
            iso customize \
              --live-ignition setup.ign \
              --dest-ignition ${{ matrix.profile }}.ign \
              --pre-install butane/detect-device.sh \
              --post-install butane/cache-bootc-image.sh \
              -o "$out_iso" \
              "$base_iso"

          xorriso \
            -dev "$out_iso" \
            -map "bootc/${{ matrix.profile }}.ociarchive" "/bootc/${{ matrix.profile }}.ociarchive" \
            -map "bootc/${{ matrix.profile }}.ociarchive.sha256" "/bootc/${{ matrix.profile }}.ociarchive.sha256" \
            -boot_image any replay \
            -compliance no_emul_toc \
            -padding included

          sha256sum "$out_iso" | tee "${out_iso}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}-${{ matrix.arch.runs_on }}
          path: |
            ${{ matrix.profile }}-*.iso
            ${{ matrix.profile }}-*.iso.sha256
            ${{ matrix.profile }}.ign
            setup.ign

      - name: Release artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          makeLatest: true
          artifacts: "${{ matrix.profile }}-*.iso,${{ matrix.profile }}-*.iso.sha256"
          generateReleaseNotes: false
          body: |
            This release is automatically updated.
