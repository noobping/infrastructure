name: Butane

on:
  push:
    branches:
      - main
      - master
    paths:
      - "butane/**"
      - ".github/workflows/butane.yml"

  workflow_dispatch: {}

concurrency:
  group: butane
  cancel-in-progress: true

env:
  CI_IMAGE_NAMESPACE: ghcr.io/noobping

jobs:
  build:
    name: Build ${{ matrix.arch.name }} ${{ matrix.profile }}
    strategy:
      matrix:
        arch:
          - name: amd64
            runs_on: ubuntu-latest
          - name: arm64
            runs_on: ubuntu-24.04-arm
        profile: [nas, workstation]

    runs-on: ${{ matrix.arch.runs_on }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4.45.1

      - name: Install Podman
        run: |
          set -euxo pipefail
          if ! command -v podman >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman
          fi
          podman --version

      - name: Merge butane files
        run: |
          set -euxo pipefail
          yq ea '. as $item ireduce ({}; . *+ $item)' butane/base.yml butane/setup.yml > butane/setup.bu
          yq ea '. as $item ireduce ({}; . *+ $item)' butane/base.yml butane/updates.yml butane/${{ matrix.profile }}.yml > butane/${{ matrix.profile }}.bu
          sed "s#__CI_IMAGE_NAMESPACE__#${CI_IMAGE_NAMESPACE}#g" butane/setup.bu > butane/setup.rendered.bu
          sed "s#__CI_IMAGE_NAMESPACE__#${CI_IMAGE_NAMESPACE}#g" butane/${{ matrix.profile }}.bu > butane/${{ matrix.profile }}.rendered.bu

      - name: Build ignition files
        run: |
          set -euxo pipefail

          podman run --rm \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/butane:release \
            --pretty --strict --files-dir . butane/setup.rendered.bu > setup.ign

          podman run --rm \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/butane:release \
            --pretty --strict --files-dir . butane/${{ matrix.profile }}.rendered.bu > ${{ matrix.profile }}.ign

      - name: Download stable release
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          podman run --rm \
            --userns=keep-id \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/coreos-installer:release \
            download -s stable -a "$arch" -p metal -f iso -C /work --decompress

      - name: Build artifacts
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          base_iso="$(ls -1 fedora-coreos-*-live-iso."$arch".iso | tail -n1)"
          out_iso="${{ matrix.profile }}-${arch}.iso"

          podman run --rm \
            --userns=keep-id \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/coreos-installer:release \
            iso customize \
              --live-ignition setup.ign \
              --dest-ignition ${{ matrix.profile }}.ign \
              --pre-install butane/detect-device.sh \
              -o "$out_iso" \
              "$base_iso"

          sha256sum "$out_iso" | tee "${out_iso}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}-${{ matrix.arch.name }}-release
          compression-level: 0
          path: |
            ${{ matrix.profile }}-*.iso
            ${{ matrix.profile }}-*.iso.sha256

      - name: Upload ignition artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}-${{ matrix.arch.name }}-ignition
          compression-level: 0
          path: |
            ${{ matrix.profile }}.ign
            setup.ign

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: release
          merge-multiple: true

      - name: Verify release assets
        run: |
          set -euxo pipefail
          ls -lh release
          find release -maxdepth 1 -type f -name '*.iso' | grep -q .
          find release -maxdepth 1 -type f -name '*.iso.sha256' | grep -q .

      - name: Release artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          makeLatest: true
          artifacts: "release/*.iso,release/*.iso.sha256"
          generateReleaseNotes: false
          body: |
            This release is automatically updated.
