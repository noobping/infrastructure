name: Butane

on:
  push:
    branches:
      - main
    paths:
      - "vm/bootc-verified-update"
      - "vm/install-cosign"
      - "vm/verify-bootc-image"
      - "butane/**"
      - ".github/workflows/butane.yml"
      - "!**/*.md"

  workflow_dispatch: {}

concurrency:
  group: butane
  cancel-in-progress: true

env:
  CI_IMAGE_NAMESPACE: ghcr.io/noobping

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    name: Build ${{ matrix.arch.name }} ${{ matrix.profile.name }}
    strategy:
      matrix:
        arch:
          - name: amd64
            runs_on: ubuntu-latest
          - name: arm64
            runs_on: ubuntu-24.04-arm
        profile:
          - name: nas
            butane: nas
          - name: workstation
            butane: workstation
          - name: sway
            butane: workstation

    runs-on: ${{ matrix.arch.runs_on }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4.45.1

      - name: Test bootc update scripts
        run: |
          sh -n vm/verify-bootc-image vm/bootc-verified-update
          sh vm/verify-bootc-image --self-test
          sh vm/bootc-verified-update --self-test

      - name: Install Podman
        run: |
          set -euxo pipefail
          if ! command -v podman >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman
          fi
          podman --version

      - name: Merge butane files
        run: |
          set -euxo pipefail
          yq ea '. as $item ireduce ({}; . *+ $item)' butane/base.yml butane/${{ matrix.profile.butane }}.yml > butane/${{ matrix.profile.name }}.bu
          sed \
            -e "s#__CI_IMAGE_NAMESPACE__#${CI_IMAGE_NAMESPACE}#g" \
            -e "s#__CI_BOOTC_IMAGE__#${{ matrix.profile.name }}#g" \
            butane/${{ matrix.profile.name }}.bu > butane/${{ matrix.profile.name }}.rendered.bu

      - name: Build ignition files
        run: |
          set -euxo pipefail
          podman run --rm \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/butane:release \
            --pretty --strict --files-dir . butane/${{ matrix.profile.name }}.rendered.bu > ${{ matrix.profile.name }}.ign

      - name: Download stable release
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          podman run --rm \
            --userns=keep-id \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/coreos-installer:release \
            download -s stable -a "$arch" -p metal -f iso -C /work --decompress

      - name: Build artifacts
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          base_iso="$(ls -1 fedora-coreos-*-live-iso."$arch".iso | tail -n1)"
          out_iso="${{ matrix.profile.name }}-${arch}.iso"

          podman run --rm \
            --userns=keep-id \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:Z" -w /work \
            quay.io/coreos/coreos-installer:release \
            iso customize \
              --dest-ignition ${{ matrix.profile.name }}.ign \
              --pre-install butane/detect-device.sh \
              -o "$out_iso" \
              "$base_iso"

          sha256sum "$out_iso" | tee "${out_iso}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile.name }}-${{ matrix.arch.name }}-release
          compression-level: 0
          path: |
            ${{ matrix.profile.name }}-*.iso
            ${{ matrix.profile.name }}-*.iso.sha256

      - name: Upload ignition artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile.name }}-${{ matrix.arch.name }}-ignition
          compression-level: 0
          path: |
            ${{ matrix.profile.name }}.ign

  guests:
    if: github.ref == 'refs/heads/main'
    name: Build guest Ignition configs
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: mikefarah/yq@v4.45.1

      - name: Install Podman
        run: |
          set -euxo pipefail
          if ! command -v podman >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y podman
          fi

      - name: Build guest configs
        run: |
          set -euxo pipefail
          mkdir -p dist/ign

          for guest in minecraft jellyfin k3s; do
            yq ea '. as $item ireduce ({}; . *+ $item)' \
              butane/base.yml \
              butane/vm.yml \
              "butane/${guest}.yml" \
              > "butane/${guest}.bu"

            sed \
              -e "s#__CI_IMAGE_NAMESPACE__#${CI_IMAGE_NAMESPACE}#g" \
              -e "s#__CI_BOOTC_IMAGE__#${guest}#g" \
              "butane/${guest}.bu" \
              > "butane/${guest}.rendered.bu"

            podman run --rm \
              -v "$PWD:/work:Z" -w /work \
              quay.io/coreos/butane:release \
              --pretty --strict --files-dir . "butane/${guest}.rendered.bu" \
              > "dist/ign/${guest}.ign"
          done

      - name: Validate Ignition configs
        run: |
          set -euxo pipefail
          for config in dist/ign/minecraft.ign dist/ign/jellyfin.ign dist/ign/k3s.ign; do
            podman run --rm -i quay.io/coreos/ignition-validate:release - < "$config"
          done

      - name: Upload guest configs
        uses: actions/upload-artifact@v4
        with:
          name: vm-ignition
          path: |
            dist/ign/minecraft.ign
            dist/ign/jellyfin.ign
            dist/ign/k3s.ign

  release:
    name: Release
    needs:
      - build
      - guests
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: release
          merge-multiple: true

      - name: Verify release assets
        run: |
          set -euxo pipefail
          ls -lh release
          find release -maxdepth 1 -type f -name '*.iso' | grep -q .
          find release -maxdepth 1 -type f -name '*.iso.sha256' | grep -q .

      - name: Release artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          makeLatest: true
          artifacts: "release/*.iso,release/*.iso.sha256"
          generateReleaseNotes: false
          body: |
            This release is automatically updated.
