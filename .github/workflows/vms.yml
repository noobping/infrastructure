name: VM images

on:
  push:
    branches:
      - main
    paths:
      - "vms/vm/**"
      - "vms/minecraft/**"
      - "vms/jellyfin/**"
      - "vms/k3s/**"
      - "butane/vm*.yml"
      - "butane/minecraft.yml"
      - "butane/jellyfin.yml"
      - "butane/k3s.yml"
      - ".github/workflows/vms.yml"
      - "!**/*.md"

  workflow_run:
    workflows:
      - IPS
    types:
      - completed
    branches:
      - main

  workflow_dispatch: {}

env:
  IMAGE_NAMESPACE: ghcr.io/noobping
  REVISION: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: vm-images
  cancel-in-progress: true

jobs:
  resolve-ips:
    if: >-
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main')
    name: Resolve verified IPS parent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.verify.outputs.digest }}
    steps:
      - uses: sigstore/cosign-installer@v3

      - id: verify
        name: Verify IPS parent image
        env:
          IMAGE: ${{ env.IMAGE_NAMESPACE }}/ips:latest
        run: |
          set -euo pipefail
          verification="$(cosign verify --output=json \
            --certificate-identity=https://github.com/noobping/infrastructure/.github/workflows/ips.yml@refs/heads/main \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "$IMAGE")"
          digest="$(printf '%s\n' "$verification" \
            | jq -er '[.[].critical.image["docker-manifest-digest"] | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))] | unique | if length == 1 then .[0] else error("expected exactly one verified digest") end')"
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"

  build-base:
    needs: resolve-ips
    if: >-
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main')
    name: Build vm ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REVISION }}

      - name: Install build tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            buildah fuse-overlayfs jq podman skopeo slirp4netns uidmap

      - name: Log in to GHCR
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$REGISTRY_TOKEN" \
            | buildah login --username "$GITHUB_ACTOR" --password-stdin ghcr.io

      - name: Build and push architecture image
        working-directory: vms/vm
        env:
          ARCH: ${{ matrix.arch }}
          IPS_DIGEST: ${{ needs.resolve-ips.outputs.digest }}
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/vm:${ARCH}-run-${GITHUB_RUN_ID}"
          buildah bud \
            --pull-always \
            --arch "$ARCH" \
            --isolation=chroot \
            --layers=false \
            --rm \
            -f Containerfile \
            -t "$image" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${REVISION}" \
            --build-arg "IMAGE_NAMESPACE=${IMAGE_NAMESPACE}" \
            --build-arg "TAG=latest@${IPS_DIGEST}" \
            .
          buildah push "$image" "docker://$image"

  publish-base:
    name: Publish vm manifest
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      immutable_tag: ${{ steps.publish.outputs.immutable_tag }}
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3

      - id: publish
        name: Publish mutable and immutable tags
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/vm"
          candidate="${image}:candidate-${GITHUB_RUN_ID}"
          docker buildx imagetools create \
            -t "$candidate" \
            "${image}:amd64-run-${GITHUB_RUN_ID}" \
            "${image}:arm64-run-${GITHUB_RUN_ID}"
          digest="$(docker buildx imagetools inspect "$candidate" \
            | awk '/^Digest:/ { print $2; exit }')"
          test -n "$digest"
          # shellcheck disable=SC2153 # REVISION is injected by the workflow env.
          revision="$(printf '%s' "$REVISION" | cut -c1-12)"
          content="${digest#sha256:}"
          immutable_tag="git-${revision}-img-${content:0:12}"
          docker buildx imagetools create \
            -t "${image}:latest" \
            -t "${image}:${immutable_tag}" \
            "${candidate}@${digest}"
          cosign sign --yes "${image}@${digest}"
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
          printf 'immutable_tag=%s\n' "$immutable_tag" >> "$GITHUB_OUTPUT"

  build-roles:
    name: Build ${{ matrix.role }} ${{ matrix.arch }}
    needs: publish-base
    strategy:
      fail-fast: false
      matrix:
        role:
          - minecraft
          - jellyfin
          - k3s
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    if: ${{ always() && needs.publish-base.result == 'success' }}
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REVISION }}
      - uses: sigstore/cosign-installer@v3

      - name: Install build tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            buildah fuse-overlayfs jq podman skopeo slirp4netns uidmap

      - name: Log in to GHCR
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$REGISTRY_TOKEN" \
            | buildah login --username "$GITHUB_ACTOR" --password-stdin ghcr.io

      - id: verify-vm
        name: Verify VM parent image
        env:
          EXPECTED_DIGEST: ${{ needs.publish-base.outputs.digest }}
          IMAGE: ${{ env.IMAGE_NAMESPACE }}/vm:latest
        run: |
          set -euo pipefail
          verification="$(cosign verify --output=json \
            --certificate-identity=https://github.com/noobping/infrastructure/.github/workflows/vms.yml@refs/heads/main \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "$IMAGE")"
          digest="$(printf '%s\n' "$verification" \
            | jq -er '[.[].critical.image["docker-manifest-digest"] | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))] | unique | if length == 1 then .[0] else error("expected exactly one verified digest") end')"
          test "$digest" = "$EXPECTED_DIGEST"
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"

      - name: Build and push architecture image
        working-directory: vms/${{ matrix.role }}
        env:
          ARCH: ${{ matrix.arch }}
          ROLE: ${{ matrix.role }}
          VM_DIGEST: ${{ steps.verify-vm.outputs.digest }}
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/${ROLE}:${ARCH}-run-${GITHUB_RUN_ID}"
          buildah bud \
            --pull-always \
            --arch "$ARCH" \
            --isolation=chroot \
            --layers=false \
            --rm \
            -f Containerfile \
            -t "$image" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${REVISION}" \
            --build-arg "IMAGE_NAMESPACE=${IMAGE_NAMESPACE}" \
            --build-arg "TAG=latest@${VM_DIGEST}" \
            .
          buildah push "$image" "docker://$image"

  publish-roles:
    name: Publish ${{ matrix.role }} manifest
    needs: build-roles
    strategy:
      fail-fast: false
      matrix:
        role:
          - minecraft
          - jellyfin
          - k3s
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3

      - name: Publish mutable and immutable tags
        env:
          ROLE: ${{ matrix.role }}
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/${ROLE}"
          candidate="${image}:candidate-${GITHUB_RUN_ID}"
          docker buildx imagetools create \
            -t "$candidate" \
            "${image}:amd64-run-${GITHUB_RUN_ID}" \
            "${image}:arm64-run-${GITHUB_RUN_ID}"
          digest="$(docker buildx imagetools inspect "$candidate" \
            | awk '/^Digest:/ { print $2; exit }')"
          test -n "$digest"
          # shellcheck disable=SC2153 # REVISION is injected by the workflow env.
          revision="$(printf '%s' "$REVISION" | cut -c1-12)"
          content="${digest#sha256:}"
          immutable_tag="git-${revision}-img-${content:0:12}"
          docker buildx imagetools create \
            -t "${image}:latest" \
            -t "${image}:${immutable_tag}" \
            "${candidate}@${digest}"
          cosign sign --yes "${image}@${digest}"
