name: VM images

on:
  push:
    branches:
      - main
    paths:
      - "vms/vm/**"
      - "vms/minecraft/**"
      - "vms/jellyfin/**"
      - "vms/k3s/**"
      - "butane/vm*.yml"
      - "butane/minecraft.yml"
      - "butane/jellyfin.yml"
      - "butane/k3s.yml"
      - ".github/workflows/vms.yml"
      - "!**/*.md"

  workflow_run:
    workflows:
      - IPS
    types:
      - completed
    branches:
      - main

  workflow_dispatch: {}

env:
  IMAGE_NAMESPACE: ghcr.io/noobping
  REVISION: ${{ github.sha }}

concurrency:
  group: vm-images
  cancel-in-progress: true

jobs:
  build-base:
    if: >-
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main')
    name: Build vm ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REVISION }}

      - name: Install build tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            buildah fuse-overlayfs podman slirp4netns uidmap

      - name: Log in to GHCR
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$REGISTRY_TOKEN" \
            | buildah login --username "$GITHUB_ACTOR" --password-stdin ghcr.io

      - name: Build and push architecture image
        working-directory: vms/vm
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/vm:${ARCH}-run-${GITHUB_RUN_ID}"
          buildah bud \
            --pull-always \
            --arch "$ARCH" \
            --isolation=chroot \
            -t "$image" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${REVISION}" \
            .
          buildah push "$image" "docker://$image"

  publish-base:
    name: Publish vm latest
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish latest manifest
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/vm"
          docker buildx imagetools create \
            -t "${image}:latest" \
            "${image}:amd64-run-${GITHUB_RUN_ID}" \
            "${image}:arm64-run-${GITHUB_RUN_ID}"

  build-roles:
    name: Build ${{ matrix.role }} ${{ matrix.arch }}
    needs: publish-base
    strategy:
      fail-fast: false
      matrix:
        role:
          - minecraft
          - jellyfin
          - k3s
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REVISION }}

      - name: Install build tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            buildah fuse-overlayfs podman slirp4netns uidmap

      - name: Log in to GHCR
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$REGISTRY_TOKEN" \
            | buildah login --username "$GITHUB_ACTOR" --password-stdin ghcr.io

      - name: Build and push architecture image
        working-directory: vms/${{ matrix.role }}
        env:
          ARCH: ${{ matrix.arch }}
          ROLE: ${{ matrix.role }}
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/${ROLE}:${ARCH}-run-${GITHUB_RUN_ID}"
          buildah bud \
            --pull-always \
            --arch "$ARCH" \
            --isolation=chroot \
            -t "$image" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${REVISION}" \
            .
          buildah push "$image" "docker://$image"

  publish-roles:
    name: Publish ${{ matrix.role }} latest
    needs: build-roles
    strategy:
      fail-fast: false
      matrix:
        role:
          - minecraft
          - jellyfin
          - k3s
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish latest manifest
        env:
          ROLE: ${{ matrix.role }}
        run: |
          set -euxo pipefail
          image="${IMAGE_NAMESPACE}/${ROLE}"
          docker buildx imagetools create \
            -t "${image}:latest" \
            "${image}:amd64-run-${GITHUB_RUN_ID}" \
            "${image}:arm64-run-${GITHUB_RUN_ID}"
