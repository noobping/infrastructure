stages:
  - deploy

default:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - test -n "${DEPLOY_SSH_PRIVATE_KEY:-}" || { echo "Missing DEPLOY_SSH_PRIVATE_KEY CI variable"; exit 1; }
    - printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - |
      if [ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
        printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      elif [ -n "${DEPLOY_HOST:-}" ]; then
        ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
      else
        echo "Missing DEPLOY_HOST and DEPLOY_SSH_KNOWN_HOSTS CI variables"
        exit 1
      fi
    - chmod 644 ~/.ssh/known_hosts

variables:
  GIT_STRATEGY: none
  DEPLOY_REGISTRY_PREFIX: ghcr.io/noobping
  DEPLOY_SSH_PORT: "22"
  DEPLOY_SSH_USER: nick

.deploy_device:
  stage: deploy
  script:
    - test -n "${DEPLOY_HOST:-}" || { echo "Missing DEPLOY_HOST CI variable"; exit 1; }
    - test -n "${DEPLOY_IMAGE:-}" || { echo "Missing DEPLOY_IMAGE CI variable"; exit 1; }
    - export DEPLOY_REF="ostree-image-signed:docker://${DEPLOY_REGISTRY_PREFIX}/${DEPLOY_IMAGE}:latest"
    - |
      ssh \
        -i ~/.ssh/id_ed25519 \
        -p "${DEPLOY_SSH_PORT}" \
        -o BatchMode=yes \
        -o StrictHostKeyChecking=yes \
        "${DEPLOY_SSH_USER}@${DEPLOY_HOST}" \
        "sudo -n rpm-ostree rebase '${DEPLOY_REF}' && sudo -n systemd-run --on-active=15s --unit=gitlab-ci-reboot /usr/bin/systemctl reboot"

deploy:nas:
  extends: .deploy_device
  variables:
    DEPLOY_HOST: $NAS_DEPLOY_HOST
    DEPLOY_IMAGE: nas
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $NAS_DEPLOY_HOST'
      when: manual
    - when: never

deploy:workstation:
  extends: .deploy_device
  variables:
    DEPLOY_HOST: $WORKSTATION_DEPLOY_HOST
    DEPLOY_IMAGE: workstation
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $WORKSTATION_DEPLOY_HOST'
      when: manual
    - when: never

deploy:desktop:
  extends: .deploy_device
  variables:
    DEPLOY_HOST: $DESKTOP_DEPLOY_HOST
    DEPLOY_IMAGE: desktop
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $DESKTOP_DEPLOY_HOST'
      when: manual
    - when: never
