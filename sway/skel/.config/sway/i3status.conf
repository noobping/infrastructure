general {
    colors = true
    interval = 5
    color_good = "#9ece6a"
    color_degraded = "#e0af68"
    color_bad = "#f7768e"
}

order += "cpu_usage"
order += "memory"
order += "disk /"
order += "volume master"
order += "tztime local"

cpu_usage {
    format = "cpu %usage"
}

memory {
    format = "mem %percentage_used"
    threshold_degraded = "80%"
    format_degraded = "mem %percentage_used"
}

disk "/" {
    format = "/ %avail"
    low_threshold = 10
    threshold_type = "gbytes_avail"
}

volume master {
    format = "vol %volume"
    format_muted = "vol muted"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "%a %d/%m %H:%M"
}
